<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Awards des Couilleux</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a1f44, #123d7a);
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      background-color: #0a1f44;
      color: gold;
      font-size: 2em;
      font-weight: bold;
      border-bottom: 3px solid gold;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
      width: 220px;
    }

    button {
      background: gold;
      color: #0a1f44;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .category {
      background-color: #123d7a;
      border: 2px solid gold;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .category h2 {
      color: gold;
      margin-bottom: 10px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background-color: #1c4fa3;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid gold;
      cursor: grab;
    }

    .card.dragging {
      opacity: 0.5;
    }
  </style>
</head>
<body>

<header>
  Les Awards des Couilleux
</header>

<div class="container">

  <input type="text" id="nom" placeholder="Ton prénom">

  <div id="categories"></div>

  <button onclick="envoyerResultats()">Envoyer les résultats</button>

</div>

<script>

const participants = ["Nom 1","Nom 2","Nom 3","Nom 4","Nom 5"];

const categoriesList = [
  "Le plus en retard",
  "Le boss",
  "Le plus discret",
  "Le plus sportif",
  "Le plus stylé",
  "Le plus drôle",
  "Le plus intelligent",
  "Le plus fainéant",
  "Le plus bavard",
  "Le plus bizarre",
  "Le plus charismatique",
  "Le plus en galère",
  "Le plus organisé",
  "Le roi de la classe"
];

const container = document.getElementById("categories");

categoriesList.forEach(cat => {
  const div = document.createElement("div");
  div.className = "category";

  const cardsHTML = participants.map(p => `<div class=\"card\" draggable=\"true\">${p}</div>`).join("");

  div.innerHTML = `<h2>${cat}</h2><div class=\"cards\">${cardsHTML}</div>`;
  container.appendChild(div);
});

let dragged = null;

document.addEventListener("dragstart", e => {
  if(e.target.classList.contains("card")){
    dragged = e.target;
    e.target.classList.add("dragging");
  }
});

document.addEventListener("dragend", e => {
  if(e.target.classList.contains("card")){
    e.target.classList.remove("dragging");
  }
});

document.addEventListener("dragover", e => {
  const containerCards = e.target.closest(".cards");
  if(!containerCards) return;

  e.preventDefault();

  const after = [...containerCards.querySelectorAll(".card:not(.dragging)")].reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = e.clientY - box.top - box.height / 2;
    if(offset < 0 && offset > closest.offset){
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;

  if(after == null){
    containerCards.appendChild(dragged);
  } else {
    containerCards.insertBefore(dragged, after);
  }
});

function envoyerResultats(){

  const nom = document.getElementById("nom").value;
  if(!nom){ alert("Entre ton prénom"); return; }

  const categories = document.querySelectorAll(".category");

  console.log("Catégories détectées:", categories.length);

  categories.forEach(cat => {

    const nomCategorie = cat.querySelector("h2").innerText;
    const cards = cat.querySelectorAll(".card");

    let classement = [];

    cards.forEach((c, i) => {
      classement.push((i+1)+". "+c.innerText);
    });

    fetch("https://script.google.com/macros/s/AKfycbzEZOzsAsmTOYcNLD_WeO71V-KVu30v7bm_cvAyh_PHzhV5UYTNhSHtp8cTSkvh39cl4A/exec", {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nom: nom,
        categorie: nomCategorie,
        classement: classement.join(" | ")
      })
    });

  });

  alert("Résultats envoyés !");
}

</script>

</body>
</html>
