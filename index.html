<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Awards des Couilleux</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0a1f44, #123d7a);
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      color: gold;
      font-size: 2em;
      font-weight: bold;
      border-bottom: 3px solid gold;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: gold;
      color: #0a1f44;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .category {
      background: #123d7a;
      border: 2px solid gold;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .category h2 {
      color: gold;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: #1c4fa3;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid gold;
      cursor: grab;
    }

    .dragging {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<header>
  Les Awards des Couilleux
</header>

<div class="container">

  <input type="text" id="nom" placeholder="Ton prénom">

  <button onclick="envoyerResultats()">Envoyer</button>

  <div id="categories"></div>

</div>

<script>

// 🔑 REMPLACE ICI
const SUPABASE_URL = "TON_URL";
const SUPABASE_KEY = "TA_CLE";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 👥 participants
const participants = ["Nom 1","Nom 2","Nom 3","Nom 4","Nom 5"];

// 📚 catégories
const categoriesList = [
  "Le plus drôle",
  "Le plus fainéant",
  "Le plus en galère",
  "Le plus stylé",
  "Le plus sportif",
  "Le plus charismatique",
  "Le plus organisé",
  "Le plus intelligent",
  "Le roi de la classe",
  "Le plus en retard",
  "Le boss",
  "Le plus discret",
  "Le plus bavard",
  "Le plus bizarre"
];

const container = document.getElementById("categories");

// 🧱 génération des catégories
categoriesList.forEach(cat => {

  const div = document.createElement("div");
  div.className = "category";

  const cards = participants.map(p =>
    `<div class="card" draggable="true">${p}</div>`
  ).join("");

  div.innerHTML = `<h2>${cat}</h2><div class="cards">${cards}</div>`;

  container.appendChild(div);
});

// 🖱️ drag & drop
let dragged = null;

document.addEventListener("dragstart", e => {
  if(e.target.classList.contains("card")){
    dragged = e.target;
    e.target.classList.add("dragging");
  }
});

document.addEventListener("dragend", e => {
  if(e.target.classList.contains("card")){
    e.target.classList.remove("dragging");
  }
});

document.addEventListener("dragover", e => {
  const container = e.target.closest(".cards");
  if(!container) return;

  e.preventDefault();

  const after = [...container.querySelectorAll(".card:not(.dragging)")]
    .reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = e.clientY - box.top - box.height/2;

      if(offset < 0 && offset > closest.offset){
        return {offset: offset, element: child};
      } else {
        return closest;
      }
    }, {offset: Number.NEGATIVE_INFINITY}).element;

  if(after == null){
    container.appendChild(dragged);
  } else {
    container.insertBefore(dragged, after);
  }
});

// 🚀 ENVOI SUPABASE (1 seule requête)
async function envoyerResultats(){

  const nom = document.getElementById("nom").value;
  if(!nom){
    alert("Entre ton prénom");
    return;
  }

  const categoriesDOM = document.querySelectorAll(".category");

  let votes = {};

  categoriesList.forEach((nomCategorie, i) => {

    const catDiv = categoriesDOM[i];
    if(!catDiv) return;

    const cards = catDiv.querySelectorAll(".card");

    let classement = [];
    cards.forEach(c => classement.push(c.innerText));

    votes[nomCategorie] = classement;
  });

  const { error } = await supabaseClient
    .from("votes")
    .insert([
      {
        nom: nom,
        votes: votes
      }
    ]);

  if(error){
    console.error(error);
    alert("Erreur envoi");
  } else {
    alert("Vote enregistré !");
  }
}

</script>

</body>
</html>
