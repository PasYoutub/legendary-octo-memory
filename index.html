<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Awards des Couilleux</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0a1f44, #123d7a);
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      color: gold;
      font-size: 2em;
      font-weight: bold;
      border-bottom: 3px solid gold;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: gold;
      color: #0a1f44;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .category {
      background: #123d7a;
      border: 2px solid gold;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .category h2 {
      color: gold;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: #1c4fa3;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid gold;
      cursor: grab;
    }

    .dragging {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<header>
  Les Awards des Couilleux
</header>

<div class="container">

  <input type="text" id="nom" placeholder="Ton prénom">

  <button onclick="envoyerResultats()">Envoyer</button>

  <div id="categories"></div>

</div>

<script>

// 🔑 SUPABASE
const SUPABASE_URL = "https://hbequjtuqflxhduoyeml.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiZXF1anR1cWZseGhkdW95ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTE3ODAsImV4cCI6MjA5MzQ2Nzc4MH0.rsVAxcY1_n9vh51c6tdujKXhOtfWKpiGtbH5htbeGkw";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 📚 catégories
const categoriesList = [
  "Qui est le meilleur prof ?",
  "Qui a le plus d'absence ?",
  "Qui est le/la pire prof ?",
  "Qui est le plus gros canard ?",
  "Qui est le pire élève ?",
  "Le plus charismatique",
  "Le plus organisé",
  "Le plus intelligent",
  "Le roi de la classe",
  "Le plus en retard",
  "Le boss",
  "Le plus discret",
  "Le plus bavard",
  "Le plus bizarre"
];

// 👥 noms différents par catégorie
const participantsParCategorie = {
  "Qui est le meilleur prof ?": ["Troubat", "Ruffini", "Mignot", "Leroy", "Proust", "Burbaut", "Gardie", "Meyer", "Hilout", "Rhalab", "Michaud", "Cornibert"],
  "Qui a le plus d'absence ?": ["Aurèle", "Ilan", "Sacha", "Orell", "Quentin", "Aaron", "Antoine", "Liam", "Kalix", "Erwin", "Alessandro", "Samuel"],
  "Qui est le/la pire prof ?": ["Mignot (2024)", "Mignot (2025)", "Mignot (2026)", "Caroline  R (2024)", "Longuesserre (2025)", "Longuesserre (2026)", "Mielon (2026)", "Derouiche (2025)", "Gardie (2024)", "Legrand (2026)", "Chaumeton & Triguy (2025)", "Moussit français (2025)", "Bourtal (2024)"],
  "Qui est le plus gros canard ?": ["Samuel", "Sacha", "Alessandro", "Antoine", "Orell"],
  "Qui est le pire élève ?": ["Léonie", "Enzo ID", "Enzo GM", "My Little Pony (Ethan)", "Tic et Tac (on a pas les blazes faites un effort)", "Antoine H", "Quentin", "Adriano", "Thomas Gauthier", "Arthur Gueritault", "Julian", "Jo La Vanille (Maelis)", "Nael", "Enora"],
  "Le plus charismatique": ["Lucas", "Tom", "Enzo"],
  "Le plus organisé": ["Mathis", "Léo", "Noah"],
  "Le plus intelligent": ["Adam", "Mathis", "Lucas"],
  "Le roi de la classe": ["Lucas", "Adam", "Hugo"],
  "Le plus en retard": ["Enzo", "Tom", "Noah"],
  "Le boss": ["Lucas", "Adam", "Mathis"],
  "Le plus discret": ["Noah", "Hugo", "Léo"],
  "Le plus bavard": ["Tom", "Enzo", "Lucas"],
  "Le plus bizarre": ["Adam", "Noah", "Hugo"]
};

const container = document.getElementById("categories");

// 🧱 génération UI
categoriesList.forEach(cat => {

  const div = document.createElement("div");
  div.className = "category";

  const cards = (participantsParCategorie[cat] || []).map(p =>
    `<div class="card" draggable="true">${p}</div>`
  ).join("");

  div.innerHTML = `<h2>${cat}</h2><div class="cards">${cards}</div>`;
  container.appendChild(div);
});

// 🖱️ drag & drop
let dragged = null;

document.addEventListener("dragstart", e => {
  if(e.target.classList.contains("card")){
    dragged = e.target;
    e.target.classList.add("dragging");
  }
});

document.addEventListener("dragend", e => {
  if(e.target.classList.contains("card")){
    e.target.classList.remove("dragging");
  }
});

document.addEventListener("dragover", e => {
  const container = e.target.closest(".cards");
  if(!container) return;

  e.preventDefault();

  const after = [...container.querySelectorAll(".card:not(.dragging)")]
    .reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = e.clientY - box.top - box.height/2;

      if(offset < 0 && offset > closest.offset){
        return {offset, element: child};
      } else {
        return closest;
      }
    }, {offset: Number.NEGATIVE_INFINITY}).element;

  if(after == null){
    container.appendChild(dragged);
  } else {
    container.insertBefore(dragged, after);
  }
});

// 🚀 ENVOI SUPABASE
async function envoyerResultats(){

  const nom = document.getElementById("nom").value;
  if(!nom){
    alert("Entre ton prénom");
    return;
  }

  const categoriesDOM = document.querySelectorAll(".category");

  let votes = {};

  categoriesList.forEach((nomCategorie, i) => {

    const catDiv = categoriesDOM[i];
    if(!catDiv) return;

    const cards = catDiv.querySelectorAll(".card");

    let classement = [];
    cards.forEach(c => classement.push(c.innerText));

    votes[nomCategorie] = classement;
  });

  const { error } = await supabaseClient
    .from("votes")
    .insert([
      {
        nom: nom,
        date: new Date().toISOString(),
        votes: votes
      }
    ]);

  if(error){
    console.error(error);
    alert("Erreur envoi");
  } else {
    alert("Vote enregistré !");
  }
}

</script>

</body>
</html>
