<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Awards des Couilleux</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a1f44, #123d7a);
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      background-color: #0a1f44;
      color: gold;
      font-size: 2em;
      font-weight: bold;
      border-bottom: 3px solid gold;
    }

    .container {
      padding: 20px;
    }

    .category {
      background-color: #123d7a;
      border: 2px solid gold;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .category h2 {
      color: gold;
      margin-bottom: 10px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background-color: #1c4fa3;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid gold;
      cursor: grab;
    }

    input {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }

    button {
      background: gold;
      color: #0a1f44;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  Les Awards des Couilleux
</header>

<div class="container">

  <input type="text" id="nom" placeholder="Ton prénom">

  <!-- 14 CATÉGORIES -->

  <div id="categories"></div>

  <button onclick="envoyerResultats()">Envoyer les résultats</button>

</div>

<script>

const noms = ["Nom 1","Nom 2","Nom 3","Nom 4"];
const categoriesList = [
  "Le plus drôle","Le plus intelligent","Le plus bg","Le plus sportif",
  "Le plus fainéant","Le plus drôle malgré lui","Le plus stylé","Le plus bizarre",
  "Le plus charismatique","Le plus bavard","Le plus discret","Le plus en retard",
  "Le boss","Le pire prof (lol)"
];

const container = document.getElementById("categories");

categoriesList.forEach(cat => {
  const div = document.createElement("div");
  div.className = "category";

  div.innerHTML = `<h2>${cat}</h2><div class="cards">${noms.map(n => `<div class="card" draggable="true">${n}</div>`).join("")}</div>`;

  container.appendChild(div);
});

let dragged = null;

document.addEventListener("dragstart", e => {
  if(e.target.classList.contains("card")){
    dragged = e.target;
  }
});

document.addEventListener("dragover", e => {
  e.preventDefault();
  const container = e.target.closest(".cards");
  if (!container) return;

  const after = [...container.children].find(child => {
    const box = child.getBoundingClientRect();
    return e.clientY < box.top + box.height / 2;
  });

  if(after) container.insertBefore(dragged, after);
  else container.appendChild(dragged);
});

function envoyerResultats() {
  const nom = document.getElementById("nom").value;
  if(!nom){ alert("Mets ton prénom"); return; }

  const categories = document.querySelectorAll('.category');

  categories.forEach(cat => {
    const nomCategorie = cat.querySelector('h2').innerText;
    const cartes = cat.querySelectorAll('.card');

    let classement = [];
    cartes.forEach((carte, index) => {
      classement.push((index + 1) + ". " + carte.innerText);
    });

    fetch("https://script.google.com/macros/s/AKfycbzEZOzsAsmTOYcNLD_WeO71V-KVu30v7bm_cvAyh_PHzhV5UYTNhSHtp8cTSkvh39cl4A/exec", {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          nom: nom,
          categorie: nomCategorie,
          classement: classement.join(" | ")
        })
      });
  });

  alert("Résultats envoyés !");
}

</script>

</body>
</html>
